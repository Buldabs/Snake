<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>🐍 Змейка</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="score-box">
            🍎 <span id="scoreValue">0</span>
            &nbsp;&nbsp;|&nbsp;&nbsp;🏆 <span id="bestScoreValue">0</span>
        </div>
        <div class="controls">
            <button class="btn" id="levelBtn">Уровень: <span id="levelLabel">1</span></button>
            <button class="btn btn-primary" id="restartBtn"> Новая игра</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="gameOverMessage"></div>

    <div class="info">
        <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> — управление &nbsp;|&nbsp;
        <kbd>R</kbd> — рестарт
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
